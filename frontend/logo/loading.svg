<svg width="96" height="96" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .scaling-group {
      transform-origin: 60% 40%;
      animation: squish 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    }
    @keyframes squish {
      0%, 100% { transform: scale(1); }
      30% { transform: scale(0.6, 1.4); }
      60% { transform: scale(1.1, 0.95); }
    }
  </style>
  <g class="scaling-group">
    <path d="M35,35 C20,45 25,75 50,80 C75,85 85,60 85,50 C85,35 65,25 45,30 M38,32 C35,20 20,20 25,35 C28,45 38,35 38,32 Z" 
          fill="none" stroke="#EAA00A" stroke-width="4" stroke-linecap="round"/>
    <path d="M48,45 L58,52 L48,59 Z" 
          fill="none" stroke="#EAA00A" stroke-width="3" stroke-linejoin="round"/>
  </g>
</svg>
